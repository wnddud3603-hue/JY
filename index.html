<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 거래 효율 계산기 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        :root {
            --maple-orange: #ff9a44;
            --erda-purple: #b794f4;
            --deep-dark: #020617;
        }

        body { 
            font-family: 'Pretendard', sans-serif;
            background: var(--deep-dark);
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-focus:focus-within {
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.15);
        }

        .item-icon-container {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .title-gradient {
            background: linear-gradient(to bottom, #fff 20%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen py-16 px-6">
    <div class="bg-glow"></div>

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-16 fade-in">
            <h1 class="text-5xl font-black title-gradient mb-4 tracking-tighter">에르다 경제 시스템</h1>
            <p class="text-slate-400 text-lg font-medium tracking-tight opacity-80">거래 방식별 메성비(메소 가성비) 정밀 분석</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-8">
                <section class="glass-panel rounded-[2rem] p-8 space-y-8">
                    <div class="flex items-center space-x-3 pb-2 border-b border-white/5">
                        <i class="fas fa-sliders text-purple-400"></i>
                        <h2 class="text-sm font-black uppercase tracking-widest text-slate-400">시세 데이터 설정</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-6">
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 ml-1">물통 비율 (1억당 가격)</label>
                            <div class="relative input-focus transition-all bg-slate-900/40 border border-white/5 rounded-2xl overflow-hidden">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M7 10C7 7.23858 9.23858 5 12 5C14.7614 5 17 7.23858 17 10V18C17 19.1046 16.1046 20 15 20H9C7.89543 20 7 19.1046 7 18V10Z" stroke="#60A5FA" stroke-width="2"/>
                                        <path d="M9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10" stroke="#60A5FA" stroke-width="2"/>
                                        <path d="M7 13H17" stroke="#60A5FA" stroke-width="2" stroke-dasharray="2 2"/>
                                        <circle cx="12" cy="15" r="2" fill="#60A5FA" fill-opacity="0.5"/>
                                    </svg>
                                </div>
                                <input type="text" id="waterRate" value="1,600" class="w-full pl-14 pr-12 py-5 bg-transparent outline-none font-black text-xl text-white" oninput="formatInput(this)">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-bold">원</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 ml-1">솔 에르다 조각 가격 (개당)</label>
                            <div class="relative input-focus transition-all bg-slate-900/40 border border-white/5 rounded-2xl overflow-hidden">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 3L19 7V17L12 21L5 17V7L12 3Z" stroke="#C084FC" stroke-width="2" stroke-linejoin="round"/>
                                        <path d="M12 3V21" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
                                        <path d="M5 7L19 17" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
                                        <path d="M19 7L5 17" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
                                        <circle cx="12" cy="12" r="3" fill="#C084FC" fill-opacity="0.3"/>
                                    </svg>
                                </div>
                                <input type="text" id="piecePrice" value="110" class="w-full pl-14 pr-12 py-5 bg-transparent outline-none font-black text-xl text-white" oninput="formatInput(this)">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-bold">원</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 ml-1">조각 경매장가 (만 단위)</label>
                            <div class="relative input-focus transition-all bg-slate-900/40 border border-white/5 rounded-2xl overflow-hidden">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-amber-500/80">
                                    <i class="fas fa-coins text-xl"></i>
                                </div>
                                <input type="text" id="pieceMeso" value="700" class="w-full pl-14 pr-20 py-5 bg-transparent outline-none font-black text-xl text-white" oninput="formatInput(this)">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-amber-500/50 font-bold text-sm uppercase">만 메소</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 ml-1">물통 수수료</label>
                            <div class="relative input-focus transition-all bg-slate-900/40 border border-white/5 rounded-2xl overflow-hidden">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                                    <i class="fas fa-receipt text-xl"></i>
                                </div>
                                <input type="number" id="taxRate" value="5" class="w-full pl-14 pr-12 py-5 bg-transparent outline-none font-black text-xl text-white">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-bold">%</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="glass-panel rounded-[2rem] p-8">
                    <h2 class="text-xs font-black text-orange-400 uppercase tracking-widest mb-6 flex items-center">
                        <i class="fas fa-wallet mr-2"></i> 총 투자 예산
                    </h2>
                    <div class="relative">
                        <input type="text" id="budget" placeholder="0" class="w-full px-6 py-6 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-orange-500 transition-all text-4xl font-black text-white text-right pr-16" oninput="formatInput(this)">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-500 font-black text-xl">원</span>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-7">
                <div id="resultArea" class="hidden space-y-8 fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass-panel rounded-[2rem] p-8 border-t-4 border-t-blue-500/50 relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="item-icon-container mb-6">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M7 10C7 7.23858 9.23858 5 12 5C14.7614 5 17 7.23858 17 10V18C17 19.1046 16.1046 20 15 20H9C7.89543 20 7 19.1046 7 18V10Z" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
                                        <path d="M12 11V16M10 13L12 11L14 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <h3 class="text-slate-400 font-bold text-sm mb-2">물통 거래 시 (수수료 적용)</h3>
                                <div class="flex items-baseline space-x-1">
                                    <span id="waterResultMeso" class="text-3xl font-black text-white tracking-tighter">0</span>
                                    <span class="text-slate-500 font-bold">메소</span>
                                </div>
                            </div>
                        </div>

                        <div class="glass-panel rounded-[2rem] p-8 border-t-4 border-t-purple-500/50 relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="item-icon-container mb-6">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 3L20 8V16L12 21L4 16V8L12 3Z" fill="#A855F7" fill-opacity="0.2" stroke="#A855F7" stroke-width="2"/>
                                        <path d="M12 8V16M8 12L12 8L16 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <h3 class="text-slate-400 font-bold text-sm mb-2">솔 에르다 조각 거래 시</h3>
                                <div class="flex items-baseline space-x-1">
                                    <span id="pieceCount" class="text-3xl font-black text-white tracking-tighter">0</span>
                                    <span class="text-slate-500 font-bold mr-2">개</span>
                                    <span id="pieceResultMeso" class="text-sm font-bold text-purple-400 opacity-80">(0 메소 가치)</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="analysisBox" class="glass-panel rounded-[2.5rem] p-10 relative overflow-hidden group">
                        <div class="relative z-10">
                            <div class="flex items-center space-x-3 mb-8">
                                <div class="h-[2px] w-8 bg-purple-500"></div>
                                <span class="text-xs font-black text-purple-400 uppercase tracking-[0.3em]">Efficiency Result</span>
                            </div>
                            <h4 id="recommendationTitle" class="text-4xl font-black text-white mb-6 leading-[1.1]"></h4>
                            <p id="comparisonText" class="text-slate-400 text-lg leading-relaxed mb-10 max-w-2xl"></p>
                            <div id="savingsBadge" class="inline-flex items-center px-10 py-5 rounded-2xl font-black text-3xl transition-transform hover:scale-105 shadow-2xl">
                            </div>
                        </div>
                        <div class="absolute right-0 top-0 w-64 h-64 bg-purple-500/5 blur-[100px] rounded-full -mr-20 -mt-20"></div>
                    </div>
                </div>

                <div id="emptyState" class="h-full min-h-[400px] glass-panel rounded-[2.5rem] flex flex-col items-center justify-center text-slate-600 border-dashed border-2 border-white/5">
                    <div class="mb-6 opacity-20">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V5C15 6.10457 14.1046 7 13 7H11C9.89543 7 9 6.10457 9 5V5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <p class="text-xl font-bold tracking-tight">계산을 위해 투자 금액을 입력해 주세요</p>
                    <p class="text-sm mt-2 font-medium opacity-60">입력된 시세를 기반으로 최적의 루트를 추천합니다</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function parseFormattedNumber(str) {
            return parseFloat(str.replace(/,/g, '')) || 0;
        }

        function formatNumberWithCommas(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function formatInput(el) {
            let value = el.value.replace(/,/g, '');
            if (isNaN(value) || value === '') {
                el.value = '';
                calculate();
                return;
            }
            el.value = formatNumberWithCommas(value);
            calculate();
        }

        function formatMeso(num) {
            return new Intl.NumberFormat('ko-KR').format(Math.floor(num));
        }

        function calculate() {
            const waterRate = parseFormattedNumber(document.getElementById('waterRate').value);
            const piecePrice = parseFormattedNumber(document.getElementById('piecePrice').value);
            const pieceMesoInput = parseFormattedNumber(document.getElementById('pieceMeso').value);
            const pieceMeso = pieceMesoInput * 10000;
            const taxRate = parseFloat(document.getElementById('taxRate').value) / 100 || 0;
            const budget = parseFormattedNumber(document.getElementById('budget').value);

            const resultArea = document.getElementById('resultArea');
            const emptyState = document.getElementById('emptyState');

            if (budget <= 0) {
                resultArea.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            resultArea.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const rawWaterMeso = (budget / waterRate) * 100000000;
            const finalWaterMeso = rawWaterMeso * (1 - taxRate);

            const pieceCount = Math.floor(budget / piecePrice);
            const totalPieceMesoValue = pieceCount * pieceMeso;

            document.getElementById('waterResultMeso').innerText = formatMeso(finalWaterMeso);
            document.getElementById('pieceCount').innerText = formatNumberWithCommas(pieceCount);
            document.getElementById('pieceResultMeso').innerText = `(${formatMeso(totalPieceMesoValue)} 메소 가치)`;

            const diff = totalPieceMesoValue - finalWaterMeso;
            const title = document.getElementById('recommendationTitle');
            const analysisText = document.getElementById('comparisonText');
            const savingsBadge = document.getElementById('savingsBadge');
            let diffAbs = Math.abs(diff);

            if (diff > 0) {
                title.innerHTML = `<span class="text-purple-400">솔 에르다 조각</span> 루트가<br>메소 획득에 압도적입니다.`;
                analysisText.innerText = `현재 시세에서는 현금으로 조각을 매입하여 경매장에 판매하는 방식이 직접 메소를 구매하는 것보다 훨씬 효율적입니다. 조각 매물을 확인해 보세요.`;
                savingsBadge.innerHTML = `<i class="fas fa-plus-circle mr-3"></i> ${formatMeso(diffAbs)} 메소 이득`;
                savingsBadge.className = "inline-flex items-center px-10 py-5 rounded-2xl font-black text-3xl bg-purple-600 text-white shadow-[0_20px_50px_rgba(147,51,234,0.3)] fade-in";
            } else {
                title.innerHTML = `<span class="text-blue-400">물통 거래</span> 루트가<br>현재 더 합리적입니다.`;
                analysisText.innerText = `조각의 개당 단가가 높거나 메소 시세가 낮아진 상태입니다. 현재는 수수료를 지불하더라도 물통(직접 메소)을 구매하는 것이 최종 수령액이 더 많습니다.`;
                savingsBadge.innerHTML = `<i class="fas fa-plus-circle mr-3"></i> ${formatMeso(diffAbs)} 메소 이득`;
                savingsBadge.className = "inline-flex items-center px-10 py-5 rounded-2xl font-black text-3xl bg-blue-600 text-white shadow-[0_20px_50px_rgba(37,99,235,0.3)] fade-in";
            }
        }

        document.getElementById('taxRate').addEventListener('input', calculate);
    </script>
</body>
</html>
